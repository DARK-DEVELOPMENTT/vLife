<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Initializing...</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      font-family: monospace;
      overflow: hidden;
      color: #00ffcc;
    }

    /* Loading Screen */
    .loading {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: black;
      z-index: 2;
    }

    .bar {
      width: 300px;
      height: 10px;
      border: 1px solid #00ffcc;
      margin-top: 20px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: #00ffcc;
      transition: width 2.5s linear;
    }

    /* Click Overlay */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3;
      cursor: pointer;
      text-align: center;
    }

    .overlay h1 {
      font-size: 28px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* Video */
    video {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
    }
  </style>
</head>

<body>

  <!-- Loading -->
  <div class="loading">
    <h1>Initializing System...</h1>
    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>
  </div>

  <!-- Click to start -->
  <div class="overlay" id="overlay">
    <h1>CLICK TO ACCESS SYSTEM</h1>
  </div>

  <!-- Video -->
  <video id="video" loop playsinline>
    <source src="video.mp4" type="video/mp4" />
  </video>

  <script>
    const fill = document.getElementById("fill");
    const loading = document.querySelector(".loading");
    const overlay = document.getElementById("overlay");
    const video = document.getElementById("video");

    // Start loading bar
    setTimeout(() => {
      fill.style.width = "100%";
    }, 300);

    // After loading → show click screen
    setTimeout(() => {
      loading.style.display = "none";
      overlay.style.display = "flex";
    }, 3000);

    // On click → play video WITH sound
    overlay.addEventListener("click", () => {
      overlay.style.display = "none";

      video.style.display = "block";
      video.muted = false;
      video.volume = 1.0;

      video.play();
    });
  </script>

</body>
</html>
